name: Lint

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  black:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lint dependencies
        run: python -m pip install --upgrade pip black

      - name: Run Black check
        run: black --check src
